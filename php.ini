; Increase upload limits for file uploads
; Nexus Social Media Platform Configuration

; Maximum size of POST data that PHP will accept
post_max_size = 100M

; Maximum allowed size for uploaded files
upload_max_filesize = 50M

; Maximum number of files that can be uploaded at once
max_file_uploads = 30

; Maximum execution time for uploads (in seconds)
max_execution_time = 300

; Maximum input time for uploads (in seconds)
max_input_time = 300

; Memory limit (should be higher than post_max_size)
memory_limit = 256M
